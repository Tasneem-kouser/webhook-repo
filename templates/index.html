<!DOCTYPE html>
<html>
<head>
    <title>GitHub Events</title>
</head>
<body>
    <h2>Latest Repository Changes</h2>
    <ul id="events"></ul>

<script>
function loadEvents() {
    fetch('/events')
        .then(res => res.json())
        .then(data => {
            const list = document.getElementById('events');
            list.innerHTML = '';
            data.forEach(event => {
                const li = document.createElement('li');
                li.textContent = event;
                list.appendChild(li);
            });
        });
}

setInterval(loadEvents, 15000);
loadEvents();
</script>

</body>
</html>
